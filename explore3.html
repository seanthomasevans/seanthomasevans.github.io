{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",

<style>
  :root {
    --bg:#020203; --panel:#111113; --text:#ededeb; --muted:#8f8f8a; --faint:#5c5c58;
    --line:#262624; --accent:#d8452f;
    --sans:"Helvetica Neue",Helvetica,Arial,sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); overflow:hidden; -webkit-font-smoothing:antialiased; }
  a { color:var(--text); text-decoration:none; }

  nav { position:fixed; top:0; left:0; right:0; z-index:40; border-bottom:1px solid var(--line); background:rgba(2,2,3,0.72); backdrop-filter:blur(10px); }
  nav .bar { display:flex; align-items:center; height:60px; max-width:100%; padding:0 28px; }
  nav .brand { font-weight:700; font-size:18px; letter-spacing:-0.015em; }

  nav .links a { color:var(--muted); } nav .links a:hover, nav .links a.here { color:var(--text); }
  @media (max-width:640px){
    nav .bar { height:auto; flex-direction:column; align-items:flex-start; padding:12px 22px 13px; gap:5px; }
    nav .brand { white-space:nowrap; }
    nav .links { margin-left:0; gap:18px; font-size:12.5px; }
  }

  #stage { position:fixed; inset:0; }
  #gl { position:absolute; inset:0; width:100%; height:100%; display:block; cursor:grab; }
  #gl:active { cursor:grabbing; }
  #labels { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
  .lbl { position:absolute; transform:translate(0,-50%); font-size:11.5px; color:rgba(160,160,155,0.85); white-space:nowrap;
         text-shadow:0 0 6px rgba(0,0,0,0.95), 0 0 2px rgba(0,0,0,0.95); transition:opacity 0.25s, color 0.25s; will-change:transform; }
  .lbl.hot { color:#fff; font-weight:700; }

  .search { position:fixed; left:28px; top:84px; z-index:25; width:300px; pointer-events:auto; }
  .search input { width:100%; background:rgba(12,12,14,0.82); border:1px solid var(--line); color:var(--text); font-family:var(--sans); font-size:13.5px; padding:11px 14px; outline:none; }
  .search input:focus { border-color:#3a3a37; }
  .search .status { margin-top:7px; font-size:11px; color:var(--faint); min-height:14px; letter-spacing:0.01em; }

  .legend { position:fixed; left:28px; bottom:24px; z-index:20; display:flex; flex-direction:column; gap:7px; }
  .legend .li { display:flex; align-items:center; gap:9px; font-size:12px; color:var(--muted); cursor:pointer; user-select:none; }
  .legend .li .dot { width:10px; height:10px; border-radius:50%; flex:none; box-shadow:0 0 10px 1px currentColor; }
  .legend .li.off { opacity:0.32; }

  .drawer { position:fixed; top:60px; right:0; bottom:0; width:min(440px,90vw); background:var(--panel); border-left:1px solid var(--line); z-index:30; transform:translateX(100%); transition:transform 0.28s cubic-bezier(0.4,0,0.2,1); overflow-y:auto; }
  .drawer.open { transform:translateX(0); }
  .drawer .inner { padding:30px 30px 60px; }
  .drawer .close { position:absolute; top:16px; right:18px; font-size:22px; color:var(--faint); cursor:pointer; line-height:1; }
  .drawer .close:hover { color:var(--text); }
  .drawer .chip { display:inline-block; font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; font-weight:700; padding:3px 9px; border-radius:2px; }
  .drawer h2 { margin-top:16px; font-weight:700; font-size:26px; letter-spacing:-0.02em; line-height:1.08; }
  .drawer .yr { margin-top:8px; font-size:13px; color:var(--muted); }
  .drawer .tags { margin-top:12px; display:flex; flex-wrap:wrap; gap:6px; }

  .drawer .sum { margin-top:18px; font-size:14.5px; line-height:1.6; color:var(--text); }
  .drawer .hl { margin-top:12px; font-size:12.5px; color:var(--accent); }
  .drawer .media { margin-top:18px; display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .drawer .media img { width:100%; height:100%; object-fit:cover; border:1px solid var(--line); aspect-ratio:4/3; }
  .drawer .open-link { display:inline-block; margin-top:18px; font-size:13px; color:var(--accent); }
  .drawer .open-link:hover { text-decoration:underline; text-underline-offset:3px; }
  .drawer .rel-h { margin-top:26px; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--faint); }
  .drawer .rel { margin-top:12px; display:flex; flex-direction:column; gap:12px; }
  .drawer .rel a { display:block; border-left:2px solid var(--line); padding:2px 0 2px 12px; cursor:pointer; }
  .drawer .rel a:hover { border-left-color:var(--accent); }
  .drawer .rel a .rt { font-size:14px; font-weight:600; }
  .drawer .rel a .rw { margin-top:3px; font-size:12px; color:var(--muted); line-height:1.5; }

  .modehint { position:fixed; right:22px; bottom:20px; z-index:20; font-size:11px; color:var(--faint); text-align:right; }
  @media (max-width:720px){ .search{ max-width:calc(100vw - 56px); width:calc(100vw - 56px); top:104px; } .legend{display:none;} }

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const CDN_EMBED = 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
let W = innerWidth, H = innerHeight;

const data = await (await fetch('data/works.json')).json();
let embeds = null;
try { embeds = await (await fetch('data/works-embeddings.json')).json(); } catch(e){ embeds = null; }
let simEdges = [];
try { simEdges = await (await fetch('data/works-sim.json')).json(); } catch(e){ simEdges = []; }
const cats = data.categories;
const works = data.works;
const byId = Object.fromEntries(works.map(w=>[w.id,w]));

const linkKey = (a,b)=>[a,b].sort().join('~');
const linkMap = new Map();
for (const w of works) for (const r of (w.related||[])) {
  const k = linkKey(w.id, r.to);
  if (!linkMap.has(k)) linkMap.set(k, {source:w.id, target:r.to, kind:'curated', why:r.why});
}
for (const s of simEdges) {
  const k = linkKey(s.source, s.target);
  if (!linkMap.has(k) && byId[s.source] && byId[s.target]) linkMap.set(k, {source:s.source, target:s.target, kind:'sim'});
}
const degree = {}; works.forEach(w=>degree[w.id]=0);
for (const l of linkMap.values()){ degree[l.source]++; degree[l.target]++; }

const nodes = works.map(w=>({ ...w, deg:degree[w.id]||0 }));
const links = [...linkMap.values()];
const R = id => 7 + Math.sqrt(degree[id]||0)*3.1;

// ---- layout: same pre-settled force plan as the flat map, then lifted into 3D
const CX = () => Math.max(W*0.54, W/2), CY = () => H*0.52;
const simF = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d=>d.id).distance(l=> 96 + (l.kind==='sim'?46:0)).strength(l=> l.kind==='curated'?0.45:0.12))
  .force('charge', d3.forceManyBody().strength(-540))
  .force('center', d3.forceCenter(CX(), CY()))
  .force('collide', d3.forceCollide().radius(d=> R(d.id)+38).strength(0.92))
  .force('x', d3.forceX(CX()).strength(0.035))
  .force('y', d3.forceY(CY()).strength(0.05));
let _sd=1337; const rnd = ()=>{ _sd=(_sd*9301+49297)%233280; return _sd/233280; };
simF.stop(); simF.alpha(1); for (let i=0;i<430;i++) simF.tick(); simF.stop();

const SCALE = 0.16;
nodes.forEach(n=>{
  n.px = (n.x - CX())*SCALE; n.py = -(n.y - CY())*SCALE; n.pz = (rnd()-0.5)*16;
  n.pa = rnd()*6.283; n.pb = rnd()*6.283;
  const h = d3.hsl(cats[n.category].color);
  h.h = (h.h + (rnd()-0.5)*8 + 360)%360;
  h.s = Math.max(0.3, Math.min(1, h.s*(0.95+rnd()*0.2)));
  h.l = Math.max(0.5, Math.min(0.72, h.l*(1.05+rnd()*0.15)));
  n.color = new THREE.Color(h.formatHex());
  n.size = R(n.id)*SCALE*1.9;
  n.breath = 0.5 + rnd()*0.7;
});

// ---- three setup
const canvas = document.getElementById('gl');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:false });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W,H);
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020203);
scene.fog = new THREE.FogExp2(0x020203, 0.0055);
const camera = new THREE.PerspectiveCamera(46, W/H, 0.1, 800);
const CAMZ = 118;
camera.position.set(0,0,CAMZ);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(W,H), 0.85, 0.45, 0.0);
composer.addPass(bloom);

// ---- sprite textures
function discTexture(stops, size=128){
  const c=document.createElement('canvas'); c.width=c.height=size;
  const g=c.getContext('2d'), gr=g.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
  for(const [o,col] of stops) gr.addColorStop(o,col);
  g.fillStyle=gr; g.fillRect(0,0,size,size);
  const t=new THREE.CanvasTexture(c); t.needsUpdate=true; return t;
}
const texCore = discTexture([[0,'rgba(255,255,255,1)'],[0.25,'rgba(255,255,255,0.95)'],[0.5,'rgba(255,255,255,0.28)'],[1,'rgba(255,255,255,0)']]);
const texSoft = discTexture([[0,'rgba(255,255,255,0.7)'],[0.4,'rgba(255,255,255,0.18)'],[1,'rgba(255,255,255,0)']]);
const texDust = discTexture([[0,'rgba(255,255,255,0.85)'],[0.4,'rgba(255,255,255,0.25)'],[1,'rgba(255,255,255,0)']],64);

// ---- node sprites (core + soft halo, both bloomed)
const nodeGroup = new THREE.Group(); scene.add(nodeGroup);
nodes.forEach(n=>{
  const mCore = new THREE.SpriteMaterial({ map:texCore, color:n.color.clone().lerp(new THREE.Color(0xffffff),0.35), blending:THREE.AdditiveBlending, depthWrite:false, transparent:true });
  const mHalo = new THREE.SpriteMaterial({ map:texSoft, color:n.color, blending:THREE.AdditiveBlending, depthWrite:false, transparent:true, opacity:0.38 });
  n.sprCore = new THREE.Sprite(mCore); n.sprCore.scale.setScalar(n.size);
  n.sprHalo = new THREE.Sprite(mHalo); n.sprHalo.scale.setScalar(n.size*2.1);
  n.sprCore.userData.id = n.id;
  n.obj = new THREE.Group(); n.obj.add(n.sprHalo); n.obj.add(n.sprCore);
  n.obj.position.set(n.px,n.py,n.pz);
  nodeGroup.add(n.obj);
  n.a = 1; n.at = 1; n.la = 1; n.lat = 1; n.hidden = false;
});

// ---- curved links: one BufferGeometry of segments, vertex-coloured, additive
const SEGS = 24;
const linkGeo = new THREE.BufferGeometry();
const lpos = new Float32Array(links.length*SEGS*2*3);
const lcol = new Float32Array(links.length*SEGS*2*3);
linkGeo.setAttribute('position', new THREE.BufferAttribute(lpos,3));
linkGeo.setAttribute('color', new THREE.BufferAttribute(lcol,3));
const linkMat = new THREE.LineBasicMaterial({ vertexColors:true, blending:THREE.AdditiveBlending, transparent:true, opacity:0.85, depthWrite:false });
const linkLines = new THREE.LineSegments(linkGeo, linkMat); scene.add(linkLines);
links.forEach(l=>{ l.a=1; l.at=1; l.hot=false; l.base = l.kind==='curated'?0.30:0.10; });

// ---- ambient dust: 2600 drifting particles in a flat ellipsoid around the graph
const DUST = 2600;
const dustGeo = new THREE.BufferGeometry();
const dpos = new Float32Array(DUST*3), dphase = new Float32Array(DUST), dsize = new Float32Array(DUST);
for(let i=0;i<DUST;i++){
  dpos[i*3]   = (rnd()-0.5)*260;
  dpos[i*3+1] = (rnd()-0.5)*160;
  dpos[i*3+2] = (rnd()-0.5)*90 - 8;
  dphase[i] = rnd()*6.283; dsize[i] = 0.35 + rnd()*1.1;
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dpos,3));
const dustMat = new THREE.PointsMaterial({ map:texDust, color:0x9fb2d8, size:0.9, sizeAttenuation:true, blending:THREE.AdditiveBlending, transparent:true, opacity:0.34, depthWrite:false });
const dust = new THREE.Points(dustGeo, dustMat); scene.add(dust);

// ---- flow particles along curated links
const flows = links.filter(l=>l.kind==='curated').map((l,i)=>({ l, sp:0.05+(i%7)*0.009, ph:(i*0.37)%1 }));
const flowGeo = new THREE.BufferGeometry();
const fpos = new Float32Array(flows.length*3);
flowGeo.setAttribute('position', new THREE.BufferAttribute(fpos,3));
const flowMat = new THREE.PointsMaterial({ map:texDust, color:0xe8eeff, size:1.6, sizeAttenuation:true, blending:THREE.AdditiveBlending, transparent:true, opacity:0.85, depthWrite:false });
const flowPts = new THREE.Points(flowGeo, flowMat); scene.add(flowPts);

// ---- labels: DOM overlay projected from 3D
const labelRoot = document.getElementById('labels');
nodes.forEach(n=>{
  const el = document.createElement('div');
  el.className='lbl';
  el.textContent = n.title.length>34 ? n.title.slice(0,32)+'…' : n.title;
  labelRoot.appendChild(el); n.lbl = el;
});

// ---- focus state
let selected=null, hoverId=null, searchSet=null;
const nbr = {}; nodes.forEach(n=>nbr[n.id]=new Set());
links.forEach(l=>{ nbr[l.source.id].add(l.target.id); nbr[l.target.id].add(l.source.id); });
function retarget(){
  const id = hoverId || selected;
  for (const n of nodes){
    if (searchSet){ n.at = searchSet.has(n.id)?1:0.07; n.lat = searchSet.has(n.id)?1:0.05; }
    else if (id){ const on = n.id===id || nbr[id].has(n.id); n.at = on?1:0.09; n.lat = n.id===id?1.3:(on?0.95:0.05); }
    else { n.at = 1; n.lat = 1; }
  }
  for (const l of links){
    if (searchSet){ l.at = 0.12; l.hot=false; }
    else if (id){ const on = l.source.id===id||l.target.id===id; l.at = on?2.6:0.10; l.hot=on; }
    else { l.at = 1; l.hot=false; }
  }
}

// ---- camera: pan/zoom via pointer (top-down map feel with slight idle sway)
let cam = { x:0, y:0, z:CAMZ, tx:0, ty:0, tz:CAMZ };
let dragging=false, lastX=0, lastY=0, moved=0;
canvas.addEventListener('pointerdown', e=>{ dragging=true; moved=0; lastX=e.clientX; lastY=e.clientY; canvas.setPointerCapture(e.pointerId); });
canvas.addEventListener('pointermove', e=>{
  if(dragging){
    const k = cam.z/620;
    cam.tx -= (e.clientX-lastX)*k; cam.ty += (e.clientY-lastY)*k;
    moved += Math.abs(e.clientX-lastX)+Math.abs(e.clientY-lastY);
    lastX=e.clientX; lastY=e.clientY;
  }
});
canvas.addEventListener('pointerup', e=>{ dragging=false; });
canvas.addEventListener('wheel', e=>{ e.preventDefault(); cam.tz = Math.max(30, Math.min(220, cam.tz * (1 + Math.sign(e.deltaY)*0.09))); }, {passive:false});
let pinch=null;
canvas.addEventListener('touchstart', e=>{ if(e.touches.length===2){ pinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); } }, {passive:true});
canvas.addEventListener('touchmove', e=>{
  if(e.touches.length===2 && pinch){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    cam.tz = Math.max(30, Math.min(220, cam.tz * pinch/d)); pinch=d;
  }
}, {passive:true});
function centerOn(n){
  const dw = Math.min(440, W*0.9);
  const shift = (dw/2) * (cam.tz/620);
  cam.tx = n.px + shift; cam.ty = n.py; cam.tz = 62;
}

// ---- picking
const ray = new THREE.Raycaster(); ray.params.Sprite = { threshold: 1.2 };
const mouse = new THREE.Vector2();
function pick(e){
  const r = canvas.getBoundingClientRect();
  mouse.x = ((e.clientX-r.left)/r.width)*2-1;
  mouse.y = -((e.clientY-r.top)/r.height)*2+1;
  ray.setFromCamera(mouse, camera);
  const cores = nodes.filter(n=>!n.hidden).map(n=>n.sprCore);
  const hit = ray.intersectObjects(cores, false)[0];
  return hit ? nodes.find(n=>n.id===hit.object.userData.id) : null;
}
canvas.addEventListener('mousemove', e=>{
  if(dragging) return;
  const n = pick(e);
  const id = n?n.id:null;
  if(id!==hoverId){ hoverId=id; retarget(); canvas.style.cursor=id?'pointer':'grab'; }
});
canvas.addEventListener('click', e=>{
  if(moved>6) return;
  const n = pick(e);
  if(n){ selected=n.id; hoverId=null; retarget(); openDrawer(n); centerOn(n); }
  else { selected=null; hoverId=null; retarget(); closeDrawer(); }
});

// ---- frame loop
const v3 = new THREE.Vector3();
let t0=null;
renderer.setAnimationLoop(ts=>{
  if(t0===null) t0=ts; const t=(ts-t0)/1000;

  // node drift + alpha lerp
  for(const n of nodes){
    const amp = 1.4 + (n.pz+8)*0.02;
    n.obj.position.x = n.px + amp*(0.6*Math.sin(t*0.36+n.pa)+0.4*Math.sin(t*0.225+n.pb));
    n.obj.position.y = n.py + amp*(0.6*Math.cos(t*0.31+n.pb)+0.4*Math.cos(t*0.185+n.pa));
    n.a += (n.at-n.a)*0.1; n.la += (n.lat-n.la)*0.1;
    const breathe = 1+0.05*Math.sin(t*n.breath+n.pa);
    n.sprCore.scale.setScalar(n.size*breathe);
    n.sprHalo.scale.setScalar(n.size*2.1*breathe);
    n.sprCore.material.opacity = n.hidden?0:n.a;
    n.sprHalo.material.opacity = n.hidden?0:0.38*n.a;
  }
  // links: rebuild curved segments (cheap at this scale)
  let vi=0;
  const pA=new THREE.Vector3(), pB=new THREE.Vector3(), pM=new THREE.Vector3(), cA=new THREE.Color(), cB=new THREE.Color();
  for(const l of links){
    l.a += (l.at-l.a)*0.1;
    const s=l.source, g=l.target;
    const hide = s.hidden||g.hidden;
    const alpha = hide?0:Math.min(1.6,l.base*l.a);
    pA.copy(s.obj.position); pB.copy(g.obj.position);
    pM.lerpVectors(pA,pB,0.5); pM.z -= pA.distanceTo(pB)*0.14;
    cA.copy(s.color).multiplyScalar(alpha); cB.copy(g.color).multiplyScalar(alpha);
    for(let k=0;k<SEGS;k++){
      const u0=k/SEGS, u1=(k+1)/SEGS;
      for(const [u,cc] of [[u0,cA.clone().lerp(cB,u0)],[u1,cA.clone().lerp(cB,u1)]]){
        const a=1-u;
        v3.x = a*a*pA.x + 2*a*u*pM.x + u*u*pB.x;
        v3.y = a*a*pA.y + 2*a*u*pM.y + u*u*pB.y;
        v3.z = a*a*pA.z + 2*a*u*pM.z + u*u*pB.z;
        lpos[vi*3]=v3.x; lpos[vi*3+1]=v3.y; lpos[vi*3+2]=v3.z;
        lcol[vi*3]=cc.r; lcol[vi*3+1]=cc.g; lcol[vi*3+2]=cc.b;
        vi++;
      }
    }
  }
  linkGeo.attributes.position.needsUpdate = true;
  linkGeo.attributes.color.needsUpdate = true;

  // dust drift
  const dp = dustGeo.attributes.position.array;
  for(let i=0;i<DUST;i++){
    dp[i*3]   += 0.006*Math.sin(t*0.2+dphase[i]);
    dp[i*3+1] += 0.005*Math.cos(t*0.17+dphase[i]*1.3);
  }
  dustGeo.attributes.position.needsUpdate = true;
  dustMat.opacity = 0.30 + 0.06*Math.sin(t*0.4);

  // flow particles
  const fp = flowGeo.attributes.position.array;
  flows.forEach((f,i)=>{
    const s=f.l.source, g=f.l.target;
    const frac=(t*f.sp+f.ph)%1, a=1-frac;
    pA.copy(s.obj.position); pB.copy(g.obj.position);
    pM.lerpVectors(pA,pB,0.5); pM.z -= pA.distanceTo(pB)*0.14;
    fp[i*3]   = a*a*pA.x + 2*a*frac*pM.x + frac*frac*pB.x;
    fp[i*3+1] = a*a*pA.y + 2*a*frac*pM.y + frac*frac*pB.y;
    fp[i*3+2] = a*a*pA.z + 2*a*frac*pM.z + frac*frac*pB.z + 0.5;
  });
  flowGeo.attributes.position.needsUpdate = true;

  // camera: ease to target + subtle idle sway
  cam.x += (cam.tx-cam.x)*0.06; cam.y += (cam.ty-cam.y)*0.06; cam.z += (cam.tz-cam.z)*0.06;
  camera.position.set(cam.x + 1.6*Math.sin(t*0.1), cam.y + 1.2*Math.sin(t*0.13), cam.z);
  camera.lookAt(cam.x, cam.y, 0);

  // labels
  for(const n of nodes){
    v3.copy(n.obj.position); v3.project(camera);
    const sx=(v3.x*0.5+0.5)*W, sy=(-v3.y*0.5+0.5)*H;
    const behind = v3.z>1;
    const la = n.hidden||behind ? 0 : Math.min(1,n.la)* (cam.z<150?1:0.55);
    n.lbl.style.opacity = la<0.04?0:la;
    if(la>=0.04){
      n.lbl.style.transform = `translate(${(sx+9+n.size*5).toFixed(1)}px, ${sy.toFixed(1)}px) translate(0,-50%)`;
      n.lbl.classList.toggle('hot', (hoverId||selected)===n.id);
    }
  }
  composer.render();
});

window.addEventListener('resize', ()=>{
  W=innerWidth; H=innerHeight;
  camera.aspect=W/H; camera.updateProjectionMatrix();
  renderer.setSize(W,H); composer.setSize(W,H);
});

// ---- legend
const legend = d3.select('#legend');
const offCats = new Set();
Object.entries(cats).forEach(([k,v])=>{
  const li = legend.append('div').attr('class','li').on('click',()=>{
    offCats.has(k)?offCats.delete(k):offCats.add(k); li.classed('off',offCats.has(k));
    nodes.forEach(n=>{ n.hidden = offCats.has(n.category); });
  });
  li.append('span').attr('class','dot').style('background',v.color).style('color',v.color);
  li.append('span').text(v.label);
});

// ---- drawer
const drawer = document.getElementById('drawer'), dbody = document.getElementById('dbody');
document.getElementById('close').onclick = ()=>{ selected=null; retarget(); closeDrawer(); };
function closeDrawer(){ drawer.classList.remove('open'); }
function openDrawer(d){
  const c = cats[d.category];
  const media = (d.media||[]).map(m=>`<img src="${m}" alt="" loading="lazy">`).join('');
  const rels = (d.related||[]).filter(r=>byId[r.to]).map(r=>`<a data-go="${r.to}"><span class="rt">${byId[r.to].title}</span><span class="rw">${r.why}</span></a>`).join('');
  dbody.innerHTML = `
    <span class="chip" style="background:${c.color};color:#fff">${c.label}</span>
    <h2>${d.title}</h2>
    <div class="yr">${d.year} · ${d.role}</div>
    <div class="tags">${(d.disciplines||[]).map(t=>`<span>${t}</span>`).join('')}</div>
    <div class="sum">${d.summary}</div>
    ${d.highlight?`<div class="hl">${d.highlight}</div>`:''}
    ${media?`<div class="media">${media}</div>`:''}
    ${d.link?`<a class="open-link" href="${d.link}">Open in context →</a>`:''}
    ${rels?`<div class="rel-h">Connected work</div><div class="rel">${rels}</div>`:''}`;
  dbody.querySelectorAll('[data-go]').forEach(a=> a.onclick=()=>{ const w=byId[a.dataset.go]; const n=nodes.find(x=>x.id===w.id); selected=w.id; retarget(); openDrawer(w); centerOn(n); });
  drawer.classList.add('open');
}

// ---- search (semantic + keyword, same as flat map)
const q = document.getElementById('q'), qstatus = document.getElementById('qstatus');
let extractor = null, loadingModel = false;
function cos(a,b){ let s=0,na=0,nb=0; for(let i=0;i<a.length;i++){ s+=a[i]*b[i]; na+=a[i]*a[i]; nb+=b[i]*b[i]; } return s/(Math.sqrt(na)*Math.sqrt(nb)); }
function keywordRank(term){
  const t=term.toLowerCase();
  return works.map(w=>({id:w.id, score:(w.title+' '+w.summary+' '+(w.disciplines||[]).join(' ')+' '+(w.highlight||'')).toLowerCase().includes(t)?1:0}));
}
function applyRank(ranked){
  const top = ranked.filter(r=>r.score>0.0).sort((a,b)=>b.score-a.score);
  const set = new Set(top.slice(0,8).map(r=>r.id));
  searchSet = set.size?set:null; retarget();
  const best = top[0];
  if(best){ const n=nodes.find(x=>x.id===best.id); if(n){ cam.tx=n.px; cam.ty=n.py; } }
}
let timer=null, seq=0;
q.addEventListener('input', ()=>{
  clearTimeout(timer);
  const term=q.value.trim(); const mine=++seq;
  if(!term){ qstatus.textContent=''; searchSet=null; retarget(); return; }
  applyRank(keywordRank(term));
  timer=setTimeout(async ()=>{
    if(!embeds) return;
    if(!extractor && !loadingModel){ loadingModel=true; try{ const {pipeline}=await import(CDN_EMBED); extractor=await pipeline('feature-extraction','Xenova/all-MiniLM-L6-v2'); }catch(err){ extractor=null; } loadingModel=false; }
    if(mine!==seq) return;
    if(extractor){
      const out=await extractor(term,{pooling:'mean',normalize:true}); if(mine!==seq) return;
      const qv=Array.from(out.data);
      const ranked=works.map(w=>({id:w.id, score: embeds[w.id]?Math.max(0,cos(qv,embeds[w.id])):0}));
      applyRank(ranked);
    }
  }, 240);
});

// deep-link
function openHash(){
  const id = decodeURIComponent(location.hash.slice(1));
  if(id && byId[id]){ selected=id; retarget(); openDrawer(byId[id]); centerOn(nodes.find(x=>x.id===id)); }
}
window.addEventListener('hashchange', openHash);
setTimeout(openHash, 250);
</script>
