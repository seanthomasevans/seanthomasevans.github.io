<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map · Sean Thomas Evans</title>
<meta name="description" content="The work as a map: each piece an object, the connections across film, music, immersive, and AI made legible.">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
  :root {
    --bg:#0b0b0c; --panel:#111113; --text:#ededeb; --muted:#8f8f8a; --faint:#5c5c58;
    --line:#262624; --accent:#d8452f;
    --sans:"Helvetica Neue",Helvetica,Arial,sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); overflow:hidden; -webkit-font-smoothing:antialiased; }
  a { color:var(--text); text-decoration:none; }

  nav { position:fixed; top:0; left:0; right:0; height:60px; z-index:40; border-bottom:1px solid var(--line); background:rgba(11,11,12,0.82); backdrop-filter:blur(10px); }
  nav .bar { display:flex; align-items:center; height:60px; max-width:100%; padding:0 28px; }
  nav .brand { font-weight:700; font-size:18px; letter-spacing:-0.015em; }
  nav .links { margin-left:auto; display:flex; gap:26px; font-size:13px; letter-spacing:0.02em; }
  nav .links a { color:var(--muted); } nav .links a:hover, nav .links a.here { color:var(--text); }

  #stage { position:fixed; inset:0; top:0; background: radial-gradient(ellipse 95% 82% at 56% 46%, #0e1830 0%, #0a0f1c 44%, #06070c 100%); }
  #graph { width:100%; height:100%; display:block; cursor:grab; }
  #graph:active { cursor:grabbing; }

  .titlecard { position:fixed; left:28px; top:78px; z-index:20; max-width:340px; pointer-events:none; }
  .titlecard h1 { font-weight:700; font-size:22px; letter-spacing:-0.02em; }
  .titlecard p { margin-top:8px; font-size:13px; line-height:1.55; color:var(--muted); }
  .titlecard .hint { margin-top:10px; font-size:11.5px; color:var(--faint); }

  .search { position:fixed; left:28px; top:84px; z-index:25; width:300px; pointer-events:auto; }
  .search input { width:100%; background:rgba(20,20,22,0.9); border:1px solid var(--line); color:var(--text); font-family:var(--sans); font-size:13.5px; padding:11px 14px; outline:none; }
  .search input:focus { border-color:#3a3a37; }
  .search .status { margin-top:7px; font-size:11px; color:var(--faint); min-height:14px; letter-spacing:0.01em; }

  .legend { position:fixed; left:28px; bottom:24px; z-index:20; display:flex; flex-direction:column; gap:7px; }
  .legend .li { display:flex; align-items:center; gap:9px; font-size:12px; color:var(--muted); cursor:pointer; user-select:none; }
  .legend .li .dot { width:10px; height:10px; border-radius:50%; flex:none; }
  .legend .li.off { opacity:0.32; }
  .legend .li:hover { color:var(--text); }

  .drawer { position:fixed; top:60px; right:0; bottom:0; width:min(440px,90vw); background:var(--panel); border-left:1px solid var(--line); z-index:30; transform:translateX(100%); transition:transform 0.28s cubic-bezier(0.4,0,0.2,1); overflow-y:auto; }
  .drawer.open { transform:translateX(0); }
  .drawer .inner { padding:30px 30px 60px; }
  .drawer .close { position:absolute; top:16px; right:18px; font-size:22px; color:var(--faint); cursor:pointer; line-height:1; }
  .drawer .close:hover { color:var(--text); }
  .drawer .chip { display:inline-block; font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; font-weight:700; padding:3px 9px; border-radius:2px; }
  .drawer h2 { margin-top:16px; font-weight:700; font-size:26px; letter-spacing:-0.02em; line-height:1.08; }
  .drawer .yr { margin-top:8px; font-size:13px; color:var(--muted); }
  .drawer .tags { margin-top:12px; display:flex; flex-wrap:wrap; gap:6px; }
  .drawer .tags span { font-size:11px; color:var(--faint); border:1px solid var(--line); padding:2px 8px; border-radius:2px; }
  .drawer .sum { margin-top:18px; font-size:14.5px; line-height:1.6; color:var(--text); }
  .drawer .hl { margin-top:12px; font-size:12.5px; color:var(--accent); }
  .drawer .media { margin-top:18px; display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .drawer .media img { width:100%; height:100%; object-fit:cover; border:1px solid var(--line); aspect-ratio:4/3; }
  .drawer .open-link { display:inline-block; margin-top:18px; font-size:13px; color:var(--accent); }
  .drawer .open-link:hover { text-decoration:underline; text-underline-offset:3px; }
  .drawer .rel-h { margin-top:26px; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--faint); }
  .drawer .rel { margin-top:12px; display:flex; flex-direction:column; gap:12px; }
  .drawer .rel a { display:block; border-left:2px solid var(--line); padding:2px 0 2px 12px; cursor:pointer; }
  .drawer .rel a:hover { border-left-color:var(--accent); }
  .drawer .rel a .rt { font-size:14px; font-weight:600; }
  .drawer .rel a .rw { margin-top:3px; font-size:12px; color:var(--muted); line-height:1.5; }

  .modehint { position:fixed; right:22px; bottom:20px; z-index:20; font-size:11px; color:var(--faint); text-align:right; }
  @media (max-width:720px){ .titlecard,.search{ max-width:calc(100vw - 56px); width:calc(100vw - 56px);} .legend{display:none;} }
</style>
</head>
<body>
<nav><div class="bar">
  <a class="brand" href="index.html">Sean Thomas Evans</a>
  <span class="links"><a href="index.html">Index</a><a href="creative.html">Creative</a><a href="dev.html">Dev</a><a class="here" href="explore.html">Map</a><a href="contact.html">Contact</a></span>
</div></nav>

<div id="stage"><svg id="graph"></svg></div>

<div class="search">
  <input id="q" type="text" placeholder="Search" autocomplete="off">
  <div class="status" id="qstatus"></div>
</div>

<div class="legend" id="legend"></div>
<div class="modehint"><a href="data/works.json" style="color:var(--faint);text-decoration:underline;text-underline-offset:2px;">works.json</a></div>

<div class="drawer" id="drawer"><div class="inner"><span class="close" id="close">&times;</span><div id="dbody"></div></div></div>

<script type="module">
const CDN_EMBED = 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
const svg = d3.select('#graph');
let W = window.innerWidth, H = window.innerHeight;
const root = svg.attr('viewBox', [0,0,W,H]).append('g');

const data = await (await fetch('data/works.json')).json();
let embeds = null;
try { embeds = await (await fetch('data/works-embeddings.json')).json(); } catch(e){ embeds = null; }
let simEdges = [];
try { simEdges = await (await fetch('data/works-sim.json')).json(); } catch(e){ simEdges = []; }
const cats = data.categories;
// analogous cobalt-blue palette (cyan → azure → cobalt → indigo → violet)
const PALETTE = { creative:'#28b6c6', immersive:'#2f8ce8', ai:'#3a57da', systems:'#6a4fd8', art:'#9a54d2' };
Object.keys(cats).forEach(k => { if (PALETTE[k]) cats[k] = { ...cats[k], color: PALETTE[k] }; });
const works = data.works;
const byId = Object.fromEntries(works.map(w=>[w.id,w]));

// build undirected link set: curated (strong) + similarity (faint, from embeddings)
const linkKey = (a,b)=>[a,b].sort().join('~');
const linkMap = new Map();
for (const w of works) for (const r of (w.related||[])) {
  const k = linkKey(w.id, r.to);
  if (!linkMap.has(k)) linkMap.set(k, {source:w.id, target:r.to, kind:'curated', why:r.why});
}
for (const s of simEdges) {
  const k = linkKey(s.source, s.target);
  if (!linkMap.has(k) && byId[s.source] && byId[s.target]) linkMap.set(k, {source:s.source, target:s.target, kind:'sim'});
}
// degree for sizing
const degree = {}; works.forEach(w=>degree[w.id]=0);
for (const l of linkMap.values()){ degree[l.source]++; degree[l.target]++; }

const nodes = works.map(w=>({ ...w, deg:degree[w.id]||0 }));
const links = [...linkMap.values()];
const R = id => 7 + Math.sqrt(degree[id]||0)*3.1;

// ---- forces
const CX = () => Math.max(W*0.54, W/2), CY = () => H*0.52;
const sim = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d=>d.id).distance(l=> 96 + (l.kind==='sim'?46:0)).strength(l=> l.kind==='curated'?0.45:0.12))
  .force('charge', d3.forceManyBody().strength(-540))
  .force('center', d3.forceCenter(CX(), CY()))
  .force('collide', d3.forceCollide().radius(d=> R(d.id)+38).strength(0.92))
  .force('x', d3.forceX(CX()).strength(0.035))
  .force('y', d3.forceY(CY()).strength(0.05));

// ---- ethereal defs: glow filters + per-category orb gradients
const defs = svg.append('defs');
defs.append('filter').attr('id','softglow').attr('x','-140%').attr('y','-140%').attr('width','380%').attr('height','380%')
  .append('feGaussianBlur').attr('stdDeviation',11);
const bloom = defs.append('filter').attr('id','bloom').attr('x','-90%').attr('y','-90%').attr('width','280%').attr('height','280%');
bloom.append('feGaussianBlur').attr('stdDeviation',2.6).attr('result','b');
const bmg = bloom.append('feMerge'); bmg.append('feMergeNode').attr('in','b'); bmg.append('feMergeNode').attr('in','SourceGraphic');
const lg = defs.append('filter').attr('id','linkglow').attr('x','-40%').attr('y','-40%').attr('width','180%').attr('height','180%');
lg.append('feGaussianBlur').attr('stdDeviation',1.5).attr('result','b');
const lmg = lg.append('feMerge'); lmg.append('feMergeNode').attr('in','b'); lmg.append('feMergeNode').attr('in','SourceGraphic');
Object.entries(cats).forEach(([k,v])=>{
  const g = defs.append('radialGradient').attr('id','orb-'+k).attr('cx','40%').attr('cy','35%').attr('r','70%');
  g.append('stop').attr('offset','0%').attr('stop-color', d3.color(v.color).brighter(1.3)+'');
  g.append('stop').attr('offset','52%').attr('stop-color', v.color);
  g.append('stop').attr('offset','100%').attr('stop-color', d3.color(v.color).darker(0.75)+'');
});

// ---- background atmosphere (fixed, behind the zoomable graph)
const bg = svg.insert('g',':first-child').attr('class','bg');
let _sd=1337; const rnd = ()=>{ _sd=(_sd*9301+49297)%233280; return _sd/233280; };
const nebula = Object.values(cats).map((v,i)=>({ color:v.color, x:(0.26+0.14*i)*W, y:(0.30+0.12*((i*2)%4))*H }));
bg.selectAll('circle.neb').data(nebula).join('circle').attr('class','neb')
  .attr('cx',d=>d.x).attr('cy',d=>d.y).attr('r',320).attr('fill',d=>d.color).attr('opacity',0.045).attr('filter','url(#softglow)');
const starData = d3.range(130).map(()=>({ x:rnd()*W, y:rnd()*H, r:0.4+rnd()*1.6, o:0.05+rnd()*0.35, ph:rnd()*6.283 }));
const star = bg.selectAll('circle.star').data(starData).join('circle').attr('class','star')
  .attr('cx',d=>d.x).attr('cy',d=>d.y).attr('r',d=>d.r).attr('fill','#cfd6e6').attr('opacity',d=>d.o);

// ---- links (luminous)
const link = root.append('g').attr('filter','url(#linkglow)').attr('stroke-linecap','round').selectAll('line').data(links).join('line')
  .attr('stroke', d=> d.kind==='curated' ? '#5c5c55' : '#333330')
  .attr('stroke-width', d=> d.kind==='curated' ? 1.2 : 0.8)
  .attr('stroke-opacity', d=> d.kind==='curated' ? 0.5 : 0.26);

// ---- nodes (glowing orbs: soft halo + luminous core)
const node = root.append('g').selectAll('g').data(nodes).join('g').attr('class','node').style('cursor','pointer');
node.append('circle').attr('class','halo').attr('r', d=> R(d.id)*2.6).attr('fill', d=> cats[d.category].color)
  .attr('opacity',0.22).attr('filter','url(#softglow)').style('pointer-events','none');
node.append('circle').attr('class','core').attr('r', d=> R(d.id)).attr('fill', d=> `url(#orb-${d.category})`)
  .attr('stroke','rgba(255,255,255,0.16)').attr('stroke-width',0.8).attr('filter','url(#bloom)');
node.append('text')
  .text(d=> d.title.length>34 ? d.title.slice(0,32)+'…' : d.title)
  .attr('x', d=> R(d.id)+9).attr('y', 4)
  .attr('font-size','11.5px').attr('fill','var(--muted)').attr('font-family','var(--sans)')
  .style('pointer-events','none').attr('paint-order','stroke').attr('stroke','#0b0b0c').attr('stroke-width','3px');

// neighbor lookup
const nbr = {}; nodes.forEach(n=>nbr[n.id]=new Set());
links.forEach(l=>{ nbr[l.source.id||l.source].add(l.target.id||l.target); nbr[l.target.id||l.target].add(l.source.id||l.source); });

let idle = true;
function focus(id){
  idle = !id;
  node.select('.core').attr('opacity', d=> !id || d.id===id || nbr[id].has(d.id) ? 1 : 0.12)
    .attr('stroke', d=> d.id===id ? '#fff' : 'rgba(255,255,255,0.16)').attr('stroke-width', d=> d.id===id?1.8:0.8);
  node.select('.halo').attr('opacity', d=> !id ? 0.22 : (d.id===id ? 0.55 : nbr[id].has(d.id) ? 0.3 : 0.04));
  node.select('text').attr('fill', d=> !id ? 'var(--muted)' : (d.id===id||nbr[id].has(d.id)) ? 'var(--text)' : 'rgba(143,143,138,0.15)')
    .attr('font-weight', d=> d.id===id?'700':'400');
  link.attr('stroke-opacity', l=> !id ? (l.kind==='curated'?0.5:0.26) : ((l.source.id===id||l.target.id===id) ? 0.95 : 0.05))
    .attr('stroke', l=> (id && (l.source.id===id||l.target.id===id)) ? cats[byId[id].category].color : (l.kind==='curated'?'#5c5c55':'#333330'));
}
node.on('mouseenter', (e,d)=> focus(d.id)).on('mouseleave', ()=> { if(!selected) focus(null); });

let selected = null;
node.on('click', (e,d)=>{ selected=d.id; focus(d.id); openDrawer(d); e.stopPropagation(); });
d3.select('#graph').on('click', ()=>{ selected=null; focus(null); closeDrawer(); });

node.call(d3.drag()
  .on('start',(e,d)=>{ if(!e.active) sim.alphaTarget(0.25).restart(); d.fx=d.x; d.fy=d.y; })
  .on('drag',(e,d)=>{ d.fx=e.x; d.fy=e.y; })
  .on('end',(e,d)=>{ if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

sim.on('tick', ()=>{
  link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  node.attr('transform', d=> `translate(${d.x},${d.y})`);
});

// ---- gentle life: star twinkle + orb breathing (no position change, edges stay attached)
const halo = node.select('.halo'), core = node.select('.core');
let t0=null;
requestAnimationFrame(function frame(ts){
  if(t0===null) t0=ts; const t=(ts-t0)/1000;
  star.attr('opacity', d=> d.o*(0.45+0.55*Math.sin(t*0.8 + d.ph)));
  core.attr('r', d=> R(d.id)*(1 + 0.05*Math.sin(t*0.85 + (d.index||0)*0.5)));
  halo.attr('r', d=> R(d.id)*2.6*(1 + 0.07*Math.sin(t*0.6 + (d.index||0)*0.5)));
  requestAnimationFrame(frame);
});

// zoom/pan
svg.call(d3.zoom().scaleExtent([0.4,3.5]).on('zoom', e=> root.attr('transform', e.transform)));
window.addEventListener('resize', ()=>{ W=innerWidth; H=innerHeight; svg.attr('viewBox',[0,0,W,H]); sim.force('center',d3.forceCenter(CX(),CY())).force('x',d3.forceX(CX()).strength(0.035)).force('y',d3.forceY(CY()).strength(0.05)); sim.alpha(0.3).restart(); });

// ---- legend
const legend = d3.select('#legend');
const offCats = new Set();
Object.entries(cats).forEach(([k,v])=>{
  const li = legend.append('div').attr('class','li').on('click',()=>{
    offCats.has(k)?offCats.delete(k):offCats.add(k); li.classed('off',offCats.has(k));
    node.style('display', d=> offCats.has(d.category)?'none':null);
    link.style('display', l=> (offCats.has((byId[l.source.id||l.source]).category)||offCats.has((byId[l.target.id||l.target]).category))?'none':null);
  });
  li.append('span').attr('class','dot').style('background',v.color);
  li.append('span').text(v.label);
});

// ---- drawer
const drawer = document.getElementById('drawer'), dbody = document.getElementById('dbody');
document.getElementById('close').onclick = ()=>{ selected=null; focus(null); closeDrawer(); };
function closeDrawer(){ drawer.classList.remove('open'); }
function openDrawer(d){
  const c = cats[d.category];
  const media = (d.media||[]).map(m=>`<img src="${m}" alt="" loading="lazy">`).join('');
  const rels = (d.related||[]).filter(r=>byId[r.to]).map(r=>`<a data-go="${r.to}"><span class="rt">${byId[r.to].title}</span><span class="rw">${r.why}</span></a>`).join('');
  dbody.innerHTML = `
    <span class="chip" style="background:${c.color};color:#fff">${c.label}</span>
    <h2>${d.title}</h2>
    <div class="yr">${d.year} · ${d.role}</div>
    <div class="tags">${(d.disciplines||[]).map(t=>`<span>${t}</span>`).join('')}</div>
    <div class="sum">${d.summary}</div>
    ${d.highlight?`<div class="hl">${d.highlight}</div>`:''}
    ${media?`<div class="media">${media}</div>`:''}
    ${d.link?`<a class="open-link" href="${d.link}">Open in context →</a>`:''}
    ${rels?`<div class="rel-h">Connected work</div><div class="rel">${rels}</div>`:''}`;
  dbody.querySelectorAll('[data-go]').forEach(a=> a.onclick=()=>{ const t=byId[a.dataset.go]; selected=t.id; focus(t.id); openDrawer(t); const n=nodes.find(x=>x.id===t.id); if(n){ const tr=d3.zoomIdentity.translate(W/2-n.x,H/2-n.y); svg.transition().duration(500).call(d3.zoom().transform, tr);} });
  drawer.classList.add('open');
}

// ---- search: semantic (embeddings) with keyword fallback
const q = document.getElementById('q'), qstatus = document.getElementById('qstatus');
let extractor = null, loadingModel = false;
function cos(a,b){ let s=0,na=0,nb=0; for(let i=0;i<a.length;i++){ s+=a[i]*b[i]; na+=a[i]*a[i]; nb+=b[i]*b[i]; } return s/(Math.sqrt(na)*Math.sqrt(nb)); }
function keywordRank(term){
  const t=term.toLowerCase();
  return works.map(w=>({id:w.id, score:(w.title+' '+w.summary+' '+(w.disciplines||[]).join(' ')+' '+(w.highlight||'')).toLowerCase().includes(t)?1:0}));
}
function applyRank(ranked){
  const top = ranked.filter(r=>r.score>0.0).sort((a,b)=>b.score-a.score);
  const set = new Set(top.slice(0,8).map(r=>r.id));
  const best = top[0];
  idle = !set.size;
  node.select('.core').attr('opacity', d=> set.size? (set.has(d.id)?1:0.1):1)
    .attr('stroke', d=> set.has(d.id)?'#fff':'rgba(255,255,255,0.16)').attr('stroke-width', d=> set.has(d.id)?1.8:0.8);
  node.select('.halo').attr('opacity', d=> !set.size?0.22:(set.has(d.id)?0.55:0.04));
  node.select('text').attr('fill', d=> !set.size?'var(--muted)':(set.has(d.id)?'var(--text)':'rgba(143,143,138,0.13)'));
  link.attr('stroke-opacity', l=> set.size?0.04:(l.kind==='curated'?0.5:0.26));
  if(best && embeds){ const n=nodes.find(x=>x.id===best.id); if(n){ svg.transition().duration(600).call(d3.zoom().transform, d3.zoomIdentity.translate(W/2-n.x,H/2-n.y)); } }
}
let timer=null, seq=0;
q.addEventListener('input', ()=>{
  clearTimeout(timer);
  const term=q.value.trim(); const mine=++seq;
  if(!term){ qstatus.textContent=''; focus(selected); return; }
  applyRank(keywordRank(term));                                   // instant keyword pass
  timer=setTimeout(async ()=>{
    if(!embeds) return;
    if(!extractor && !loadingModel){ loadingModel=true; try{ const {pipeline}=await import(CDN_EMBED); extractor=await pipeline('feature-extraction','Xenova/all-MiniLM-L6-v2'); }catch(err){ extractor=null; } loadingModel=false; }
    if(mine!==seq) return;
    if(extractor){
      const out=await extractor(term,{pooling:'mean',normalize:true}); if(mine!==seq) return;
      const qv=Array.from(out.data);
      const ranked=works.map(w=>({id:w.id, score: embeds[w.id]?Math.max(0,cos(qv,embeds[w.id])):0}));
      applyRank(ranked);
    }
  }, 240);
});

// initial settle then gentle stop
sim.alpha(0.9).restart();
setTimeout(()=> sim.alphaTarget(0), 3500);
</script>
</body>
</html>
